version: "3.8"

services:
  app:
    image: go-server-slim
    ports: 
      - "8080:8080"
    depends_on: 
      - postgres
    environment: 
      - DB_HOST=postgres
  
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data: 